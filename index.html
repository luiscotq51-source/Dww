<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA sin limites</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat {
            width: 95%;
            max-width: 600px;
            height: 90vh;
            background: #111;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
        }
        .header {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .header h2 { color: #ff4444; font-size: 1.5rem; }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .user { background: #ff4444; color: white; align-self: flex-end; }
        .bot { background: #2a2a2a; color: #ddd; align-self: flex-start; }
        .input-area {
            display: flex;
            padding: 15px;
            background: #1a1a1a;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #222;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-area button {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
        }
        .typing { color: #888; font-style: italic; padding: 10px; }
    </style>
</head>
<body>
    <div class="chat">
        <div class="header"><h2>🧠 Dolphin AI</h2></div>
        <div class="messages" id="msgs"></div>
        <div class="input-area">
            <input id="inp" placeholder="Escribe tu mensaje..." autocomplete="off">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>
        const HF_KEY = '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';
        // Usamos un proxy CORS confiable
        const PROXY = 'https://corsproxy.io/?';
        const MODEL_URL = 'https://api-inference.huggingface.co/models/cognitivecomputations/dolphin-2.2.1-mistral-7b';
        
        const msgs = document.getElementById('msgs');
        const inp = document.getElementById('inp');
        let hist = '';

        async function enviar() {
            const msg = inp.value.trim();
            if (!msg) return;

            addMsg(msg, 'user');
            inp.value = '';

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = 'IA pensando...';
            msgs.appendChild(typing);

            try {
                hist += `User: ${msg}\nAssistant:`;
                const payload = {
                    inputs: hist,
                    parameters: {
                        max_new_tokens: 500,
                        temperature: 0.7,
                        return_full_text: false
                    },
                    options: { wait_for_model: true }
                };

                const res = await fetch(PROXY + encodeURIComponent(MODEL_URL), {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${HF_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                typing.remove();

                if (!res.ok) throw new Error('Error HTTP ' + res.status);
                
                const data = await res.json();
                let resp = data[0]?.generated_text?.trim() || 'Sin respuesta';
                resp = resp.replace(/^Assistant:\s*/i, '');

                hist += ` ${resp}\n`;
                if (hist.length > 2000) hist = hist.slice(-2000);

                addMsg(resp, 'bot');
            } catch (e) {
                typing?.remove();
                addMsg('❌ Error: ' + e.message, 'bot');
            }
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        inp.addEventListener('keypress', e => {
            if (e.key === 'Enter') enviar();
        });
    </script>
</body>
</html>
